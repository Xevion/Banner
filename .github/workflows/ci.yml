name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Check formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cargo fmt --all -- --check
          else
            cargo fmt --all -- --check || echo "::warning::Rust formatting issues found (not failing on push)"
          fi

      - name: Clippy
        run: cargo clippy --no-default-features -- -D warnings

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web
        run: bun ci --frozen-lockfile

      - name: Sync SvelteKit
        working-directory: web
        run: bunx svelte-kit sync

      - name: Check formatting
        working-directory: web
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun run format:check
          else
            bun run format:check || echo "::warning::Frontend formatting issues found (not failing on push)"
          fi

      - name: Type check
        working-directory: web
        run: bun run typecheck

      - name: Lint
        working-directory: web
        run: bun run lint

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: banner
          POSTGRES_PASSWORD: banner
          POSTGRES_DB: banner
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://banner:banner@localhost:5432/banner
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@19c6fa0af731e20a897c0a65f117c1a415b1fa26 # cargo-nextest

      - name: Run tests
        run: cargo nextest run --no-default-features

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: web
        run: bun ci --frozen-lockfile

      - name: Sync SvelteKit
        working-directory: web
        run: bunx svelte-kit sync

      - name: Run tests
        working-directory: web
        run: bun run test

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cargo-audit
        uses: taiki-e/install-action@5626e41434f03ab3022d9685405c0645c879f441 # cargo-audit

      - name: Rust security audit
        run: cargo audit

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: web
        run: bun ci --frozen-lockfile

      - name: Frontend security audit
        working-directory: web
        # Ignore list lives in audit-ignore.json (shared with tempo.config.ts) -- derive --ignore flags from it.
        run: |
          mapfile -t ignores < <(jq -r 'map("--ignore=" + .id)[]' ../audit-ignore.json)
          bun audit --audit-level=moderate "${ignores[@]}"

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
